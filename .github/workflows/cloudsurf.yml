name: CloudSurf

on:
  workflow_dispatch:
    inputs:
      script:
        description: "Script to run (e.g. colab_run_all, youtube_warmup)"
        required: true
        default: "colab_run_all"
      run_time:
        description: "Seconds to let scripts run after browsers are up (default: 300)"
        required: false
        default: "7200"

jobs:
  run:
    runs-on: ubuntu-latest
    # Total job timeout — setup (~3 min) + run_time + buffer.
    # Increase this if your scripts need longer. Max GitHub allows is 360 min.
    timeout-minutes: 330

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Cache Node deps ───────────────────────────────────────────────────
      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: scripts/node_modules
          key: node-${{ hashFiles('scripts/package.json') }}

      # ── 3. Install Chrome ────────────────────────────────────────────────────
      - name: Install Chrome
        run: |
          wget -q -O /tmp/chrome.deb \
            https://dl.google.com/linux/direct/google-chrome-stable_current_amd64.deb
          sudo apt-get install -y /tmp/chrome.deb 2>/dev/null || \
            sudo apt-get install -yf 2>/dev/null
          google-chrome --version

      # ── 4. Install Node deps ─────────────────────────────────────────────────
      - name: Install Node deps
        run: npm install --prefix scripts

      # ── 5. Download & unzip profiles from Google Drive ───────────────────────
      - name: Download profiles
        env:
          PROFILES_ZIP_URL: ${{ secrets.PROFILES_ZIP_URL }}
        run: |
          echo "Installing gdown..."
          pip install -q gdown

          echo "Downloading profiles zip..."
          # Extract the file ID from the Drive URL and use gdown to handle
          # large-file confirmation pages that break curl/wget on files >100 MB.
          FILE_ID=$(echo "$PROFILES_ZIP_URL" | grep -oP '(?<=/d/)[^/]+|(?<=id=)[^&]+' | head -1)
          if [ -z "$FILE_ID" ]; then
            echo "ERROR: Could not extract file ID from PROFILES_ZIP_URL"
            exit 1
          fi
          echo "Drive file ID: $FILE_ID"
          gdown "https://drive.google.com/uc?export=download&id=$FILE_ID" -O /tmp/profiles.zip

          echo "Unzipping..."
          unzip -q /tmp/profiles.zip -d ./profiles_tmp

          # Handle whether the zip contains a single top-level folder or
          # profile folders directly. We always want ./profiles/<profile_id>/
          TOP=$(ls ./profiles_tmp | head -1)
          if [ -d "./profiles_tmp/$TOP/chrome" ] || [ -f "./profiles_tmp/$TOP/meta.json" ]; then
            # Already profile-level at top
            mv ./profiles_tmp ./profiles
          else
            # One extra wrapper folder
            mv "./profiles_tmp/$TOP" ./profiles
            rm -rf ./profiles_tmp
          fi

          echo "Profiles found:"
          ls ./profiles

      # ── 6. Launch browsers & run script ─────────────────────────────────────
      - name: Run CloudSurf
        env:
          CLOUDSURF_SCRIPT:   ${{ github.event.inputs.script }}
          CLOUDSURF_NOTEBOOK: ${{ secrets.CLOUDSURF_NOTEBOOK }}
          CLOUDSURF_RUN_TIME: ${{ github.event.inputs.run_time }}
          PROFILES_DIR:       ./profiles
        run: python launch.py
